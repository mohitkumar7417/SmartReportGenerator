<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AutoReport</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            margin:20px;
            background:#f4f4f4;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:8px;
        }

        h1{
            color:#2c3e50;
            text-align:center;
        }

        table{
            border-collapse:collapse;
            width:100%;
        }

        table,th,td{
            border:1px solid black;
        }

        th,td{
            padding:8px;
            text-align:center;
        }

        img{
            max-width:100%;
            height:auto;
            display:block;
            margin:20px auto;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Sales Report</h1>

<h3>Total Sales: {{ total_sales }}</h3>
<h3>Average Sales: {{ average_sales }}</h3>

<h2>Category Wise Sales</h2>

<ul>
{% for category, value in category_sales.items() %}
<li>{{ category }} : {{ value }}</li>
{% endfor %}
</ul>

<h2>Full Data</h2>

{{ table | safe }}

<h2>Sales Chart</h2>

<img src="{{ chart }}" alt="Sales Chart">

</div>

</body>
</html>
